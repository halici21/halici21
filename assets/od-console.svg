  <g font-family="Consolas, 'Courier New', monospace">
    <text x="74" y="82" font-size="13" fill="#64748b">STATE MODEL</text>
    <text x="74" y="103" font-size="13" fill="#e2e8f0">Moon-centered frame</text>
    <text x="74" y="125" font-size="13" fill="#94a3b8">third-body dynamics</text>

    <text x="354" y="82" font-size="13" fill="#64748b">TRACKING DATA</text>
    <text x="354" y="103" font-size="13" fill="#e2e8f0">range | angles | Doppler</text>
    <text x="354" y="125" font-size="13" fill="#94a3b8">visibility constrained</text>

    <text x="676" y="82" font-size="13" fill="#64748b">ESTIMATION</text>
    <text x="676" y="103" font-size="13" fill="#e2e8f0">BLS-LM | SRIF | SR-UKF</text>
    <text x="676" y="125" font-size="13" fill="#94a3b8">batch and sequential</text>

    <text x="1010" y="82" font-size="13" fill="#64748b">INTERPRETATION</text>
    <text x="1010" y="103" font-size="13" fill="#e2e8f0">error | covariance | NIS</text>
    <text x="1010" y="125" font-size="13" fill="#94a3b8">conditioning and runtime</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="74" y="188" font-size="44" font-weight="800" fill="#f8fafc">Cemil Eray Halici</text>
