    <path d="M384 52 V248"/>
    <path d="M570 52 V248"/>
    <path d="M756 52 V248"/>
    <path d="M942 52 V248"/>
    <path d="M1128 52 V248"/>
  </g>

  <path d="M88 224 C210 168 305 154 430 126 C565 96 665 72 800 110 C948 152 1036 188 1200 76" stroke="url(#line)" stroke-width="3" fill="none" filter="url(#softGlow)"/>
  <path d="M92 238 C250 188 372 205 528 174 C700 140 810 166 964 196 C1075 218 1138 182 1200 150" stroke="#64748b" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M88 164 C278 116 440 150 620 152 C820 154 980 88 1200 112" stroke="#94a3b8" stroke-width="1.2" fill="none" opacity="0.35"/>

